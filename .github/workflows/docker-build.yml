name: Docker Build

on:
  push:
    paths:
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Build Docker image
        run: |
          docker build -t kvideo:latest .
          docker save kvideo:latest | gzip > /tmp/kvideo.tar.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kvideo-docker
          path: /tmp/kvideo.tar.gz
          retention-days: 1
